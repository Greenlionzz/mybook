name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Run Version Bump
      run: node version-bump.cjs

    - name: Install Web Dependencies
      run: npm install && npm install webdav @capacitor/core

    - name: Build Web App
      run: npm run build

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Capacitor and Android Platform
      run: |
        npm install
        if [ ! -f capacitor.config.json ] && [ ! -f capacitor.config.ts ]; then
          npx cap init "SIRIN" "com.mytime.app" --web-dir=dist
        fi
        npx cap add android
        npx cap sync android

    - name: Fix Kotlin Duplicate Classes
      run: |
        cat <<EOF >> android/build.gradle
        allprojects {
            configurations.all {
                exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
            }
        }
        EOF

    - name: Make Gradle executable
      run: chmod +x ./android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Commit and Push Version Bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add package.json
        # The '--force' here ensures the Action can always push the bump 
        # even if you pushed code in the meantime
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto version bump [skip ci]" && git push origin main --force)

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sirin-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
